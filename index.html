<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RootEscape v2.0 | Cyber Breach</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-ui { position: absolute; top: 20px; text-align: center; width: 100%; font-size: 28px; z-index: 10; font-weight: bold; }
        canvas { background: radial-gradient(circle, #001a00 0%, #000 100%); border: 3px solid #0f0; box-shadow: 0 0 30px #030; }
        #start-screen { position: absolute; background: rgba(0, 10, 0, 0.95); padding: 40px; border: 2px solid #0f0; text-align: center; z-index: 20; }
        button { background: #0f0; color: #000; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div id="game-ui">DATA BREACHED: <span id="score">0</span> GB</div>

    <div id="start-screen">
        <h1 style="color: #0f0; text-shadow: 0 0 10px #0f0;">SYSTEM ACCESS</h1>
        <p>Firewall-lardan qaç, datanı oğurla!</p>
        <button onclick="startGame()">HACK-I BAŞLAT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');

        canvas.width = 400;
        canvas.height = 600;

        let score = 0, isGameRunning = false, frames = 0, obstacles = [];

        const player = {
            x: 60, y: 300, w: 25, h: 25, gravity: 0.5, velocity: 0, jump: -8,
            draw() {
                ctx.fillStyle = "#0f0";
                ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(this.x, this.y, this.w, this.h);
            },
            update() {
                if (!isGameRunning) return;
                this.velocity += this.gravity;
                this.y += this.velocity;
                if (this.y + this.h > canvas.height || this.y < 0) endGame();
            }
        };

        function startGame() {
            startScreen.style.display = 'none';
            score = 0; scoreElement.innerText = score;
            player.y = 300; player.velocity = 0;
            obstacles = []; frames = 0;
            isGameRunning = true;
            animate();
        }

        function endGame() {
            isGameRunning = false;
            startScreen.style.display = 'block';
            startScreen.querySelector('h1').innerText = "CONNECTION LOST!";
            startScreen.querySelector('p').innerHTML = "Oğurlanan Data: " + score + " GB";
        }

        function createObstacle() {
            let gap = 160;
            let h = Math.random() * (canvas.height - gap - 100) + 50;
            obstacles.push({ x: canvas.width, top: h, bottom: canvas.height - h - gap, passed: false });
        }

        function animate() {
            if (!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.update();
            player.draw();

            if (frames % 85 === 0) createObstacle();

            obstacles.forEach((obs, i) => {
                obs.x -= 4; // Sürəti bir az artırdım

                // Firewall (Maneə) Dizaynı
                ctx.fillStyle = "#300"; // Tünd qırmızı
                ctx.fillRect(obs.x, 0, 55, obs.top);
                ctx.fillRect(obs.x, canvas.height - obs.bottom, 55, obs.bottom);
                
                // Maneənin kənarındakı "təhlükə" xətti
                ctx.fillStyle = "#f00";
                ctx.fillRect(obs.x + 50, 0, 5, obs.top);
                ctx.fillRect(obs.x + 50, canvas.height - obs.bottom, 5, obs.bottom);

                // TOQQOUŞMA MƏNTİQİ
                if (player.x + player.w > obs.x && player.x < obs.x + 55 &&
                    (player.y < obs.top || player.y + player.h > canvas.height - obs.bottom)) {
                    endGame();
                }

                // XAL MƏNTİQİ (Xətasız versiya)
                if (obs.x + 55 < player.x && !obs.passed) {
                    score++;
                    obs.passed = true;
                    scoreElement.innerText = score;
                }

                if (obs.x < -60) obstacles.splice(i, 1);
            });

            frames++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') player.velocity = player.jump; });
        window.addEventListener('touchstart', (e) => { player.velocity = player.jump; e.preventDefault(); }, {passive: false});

    </script>
</body>
</html>
