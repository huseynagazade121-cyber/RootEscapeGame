<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RootEscape | Cyber Mission</title>
    <style>
        /* CSS HİSSƏSİ */
        body { margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-ui { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; text-shadow: 0 0 10px #0f0; z-index: 10; pointer-events: none; }
        #start-screen { position: absolute; text-align: center; background: rgba(0, 0, 0, 0.9); padding: 40px; border: 2px solid #0f0; z-index: 20; box-shadow: 0 0 20px #0f0; }
        canvas { background: #050505; border: 2px solid #0f0; max-width: 100%; max-height: 100vh; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 20px; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

    <div id="game-ui">SCORE: <span id="score">0</span></div>

    <div id="start-screen">
        <h1 style="letter-spacing: 5px;">ROOT ESCAPE</h1>
        <p>FIREWALL-LARDAN KEÇMƏK ÜÇÜN <br><b>SPACE</b> VƏ YA <b>EKRANA TOXUN</b></p>
        <button onclick="startGame()">SİSTEMİ BAŞLAT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /* JAVASCRIPT HİSSƏSİ */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');

        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let isGameRunning = false;
        let frames = 0;
        let obstacles = [];

        const packet = {
            x: 50, y: 250, w: 30, h: 30,
            gravity: 0.4, velocity: 0, jump: -7,
            draw() {
                ctx.fillStyle = "#0f0";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(this.x, this.y, this.w, this.h);
            },
            update() {
                if (!isGameRunning) return;
                this.velocity += this.gravity;
                this.y += this.velocity;
                if (this.y + this.h > canvas.height || this.y < 0) endGame();
            }
        };

        function startGame() {
            startScreen.style.display = 'none';
            score = 0;
            scoreElement.innerText = score;
            packet.y = 250;
            packet.velocity = 0;
            obstacles = [];
            isGameRunning = true;
            animate();
        }

        function endGame() {
            isGameRunning = false;
            startScreen.style.display = 'block';
            startScreen.querySelector('h1').innerText = "SYSTEM CRASHED!";
            startScreen.querySelector('p').innerHTML = "Xalın: " + score + "<br>Yenidən cəhd et!";
        }

        function createObstacle() {
            let gap = 170;
            let minH = 50;
            let h = Math.random() * (canvas.height - gap - (minH * 2)) + minH;
            obstacles.push({ x: canvas.width, top: h, bottom: canvas.height - h - gap });
        }

        function animate() {
            if (!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            packet.update();
            packet.draw();

            if (frames % 90 === 0) createObstacle();

            obstacles.forEach((obs, i) => {
                obs.x -= 3;
                ctx.fillStyle = "#f00"; // Firewall rəngi
                ctx.fillRect(obs.x, 0, 50, obs.top);
                ctx.fillRect(obs.x, canvas.height - obs.bottom, 50, obs.bottom);

                // Toqquşma
                if (packet.x < obs.x + 50 && packet.x + packet.w > obs.x &&
                    (packet.y < obs.top || packet.y + packet.h > canvas.height - obs.bottom)) {
                    endGame();
                }

                if (obs.x === 50) { score++; scoreElement.innerText = score; }
                if (obs.x < -50) obstacles.splice(i, 1);
            });

            frames++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') packet.velocity = packet.jump; });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); packet.velocity = packet.jump; });

        console.log("Cyber Engine v1.1 - Online");
    </script>
</body>
</html>
